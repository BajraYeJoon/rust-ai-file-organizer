name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: ifo-linux-amd64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: ifo-windows-amd64.exe
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: ifo-macos-amd64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: ifo-macos-arm64

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: target/${{ matrix.target }}/release/ifo*

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            ifo-linux-amd64/ifo
            ifo-windows-amd64.exe/ifo.exe
            ifo-macos-amd64/ifo
            ifo-macos-arm64/ifo
          generate_release_notes: true
